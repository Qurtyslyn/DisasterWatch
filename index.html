    <link rel="stylesheet" href="L.Control.Layers.Tree.css" />

    <script src="helperFunctions.js"></script>

    <!--Load toGeoJSON file-->

    <!--Stylesheet for map Legend-->
    <link rel="stylesheet" href="css/legend.css" />

    <style>
      #map {
        width: 100%;
        height: 960px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="text/javascript">

        document.getElementById("map").style.height = (window.innerHeight - 20) + "px";

        //URL Configs for each source

        var fireURL = 'https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Interagency_Perimeters_Current/FeatureServer/0/query?outFields=*&where=1%3D1&f=geojson';
        var CAUrl = "https://cwfis.cfs.nrcan.gc.ca/geoserver/public/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=public:m3_polygons_current&outputFormat=json";
        var earthquakeURL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson";
        var nwsURL = "https://api.weather.gov/alerts/active?status=actual";
        var volcanoURL = "./Volcanoes.geojson";
        var hurricaneURL = './Hurricanes.geojson';
        var nwsCoastalZonesURL = './NWSCoastalZones.geojson';
        var nwsZonesURL = './NWSZones.geojson';

        //fetch(fireURL).then(response => response.json()).then(response
        function getJSONData(url)
        {
            fetch(url).then(response => response.json()).then(response => {return response})
        }

        //Create Map Base Layers

        //Create Topo layer of the map
        var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            minZoom: 3,
            attribution: 'Map Data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map Style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>) | <a href="https://github.com/Qurtyslyn/DisasterWatch/wiki/Data-Sources">Alert Data</a>'
        });

        //Create the Streets layer of the Map
        var streets = L.tileLayer( 'http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | <a href="https://github.com/Qurtyslyn/DisasterWatch/wiki/Data-Sources">Alert Data</a>',
            maxZoom: 18,
            minZoom: 3,
            subdomains: ['a','b','c']
        });

        //Create Imagery Layer of the Map
        var imagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
	        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community | <a href="https://github.com/Qurtyslyn/DisasterWatch/wiki/Data-Sources">Alert Data</a>',
            maxZoom: 18,
            minZoom: 3
        });

        //Create the Map, Centered on US
        map = L.map('map', {
            center: [39.8283, -98.5795],
            zoom: 5,
            layers: [streets],
            doubleClickZoom: false,
            worldCopyJump: true
        });

        //Create Background Options for the Map Menu
        var backgrounds = [
            {
                groupName : "Background Map",
                expanded : true,
                layers : {
                    "Topographic" : topo,
                    "Basic" : streets,
                    "Satellite" : imagery
                }
            }
          ];

        //Add Base Layers Selection Tree
        var baseTree = {label: 'Base Layers',
            children: [
                {
                    label: 'Topographic',
                    layer: topo
                },
                {
                    label: 'Basic',
                    layer: streets
                },
                {
                    label: 'Satellite',
                    layer: imagery
                }
            ]
        };

        //Create Legend
        var legend = L.control({ position: "bottomleft" });

        legend.onAdd = function(map) {
            var div = L.DomUtil.create("div", "legend");
            div.innerHTML += "<h4>Legend</h4>";
            div.innerHTML += '<span id="Earthquake"><span class="symbol round earthquake"></span><span>Earthquake</span></span><br>';
            div.innerHTML += '<span id="Volcano"><span class="symbol round volcano"></span><span>Volcano</span></span><br>';
            div.innerHTML += '<span id="Fire"><span class="symbol fire"></span><span>Wildfire</span></span><br>';
            //div.innerHTML += '<i class="icon" style="background-image: url(https://d30y9cdsu7xlg0.cloudfront.net/png/194515-200.png);background-repeat: no-repeat;"></i><span>Grænse</span><br>';

            return div;
        };

        legend.addTo(map);

        //Add Overlay Options to Selection Tree
        var overlayTree = {label: 'Incidents', children: []};

        var group = new L.LayerGroup();

        //Add Fire Layer to Map
        const response = fetch(fireURL).then(response => response.json()).then(response => {
            L.geoJson(response, {
                style: function(feature) {
                    //Set Opacity of the fill based on the Containment percentage of the fire
                    var opacity = 1 -(feature.properties.attr_PercentContained / 100)

                    if(opacity < 0.3)
                    {
                        opacity = 0.3;
                    }
                    else if (opacity > 0.65)
                    {
                        opacity = 0.65;
                    }

                    return {color: "#FF0000", fillOpacity: opacity}
                },
                onEachFeature: onEachFeatureFire
            }
            
        ).addTo(group);
        })

        overlayTree.children.push({label: "US Wildfires", layer: group});
        group.addTo(map);


        /*const responseCA = fetch(CAUrl).then(responseCA => responseCA.json()).then(responseCA => {
            L.geoJson(responseCA, {
                style: function(feature) {
                    
                        return {color: "#FF0000"}
                    
                }
                
            }
            
        ).addTo(map);
        })*/

        var EQgroup = new L.LayerGroup();

        //Add Earthquake Layer to Map
        const eqresponse = fetch(earthquakeURL).then(eqresponse => eqresponse.json()).then(eqresponse => {
            L.geoJson(eqresponse, {
                pointToLayer: function (feature, latlng)
                {
                    var color = ""
                    if(feature.properties.mag < 3)
                    {
                        color = "#FF8B01";
                    }
                    else if(feature.properties.mag < 5)
                    {
                        color = "#F55301";
                    }
                    else
                    {
                        color = "#EB1C01";
                    }

                    var options = {
                        radius: 1.8 ** feature.properties.mag,
                        fillColor: color,
                        fillOpacity: 0.5,
                        stroke: false,

                    };

                    return L.circleMarker(latlng, options);
                },
                onEachFeature: onEachFeatureEQ
            
        }).addTo(EQgroup);
        })

        overlayTree.children.push({label: "Earthquakes", layer: EQgroup});
        EQgroup.addTo(map);

        var NWSgroup = new L.LayerGroup();

        var nwsCoastalZones = getJSONData(nwsCoastalZonesURL);

        //Add NWS Alerts Layer to Map
        const NWSresponse = fetch(nwsURL, {headers: {"accept": "application/geo+json"}}).then(NWSresponse => NWSresponse.json()).then(NWSresponse => {
            //Add geometry to zones that do not have it.

            L.geoJson(NWSresponse, {
                style: function(feature) {
                    return getPolygonColors(feature.properties.event);
                },
                onEachFeature: onEachFeatureNWS,
                //Filter out alerts that use Zones rather than Polygons for areas
                filter: function(feature, layer) {
                    if(feature.geometry == null)
                    {
                        return false;
                    }
                    else
                    {
                        return true;
                    }
                }
            }
            
        ).addTo(NWSgroup);
        })

        overlayTree.children.push({label: "NWS Alerts", layer: NWSgroup});
        NWSgroup.addTo(map);


        //Add Volcanos to map
        /*const volcanoResponse = fetch(volcanoURL).then((response) => response.text()).then((text) => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, "text/xml");
                    console.log(doc.documentElement.nodeName);
                });*/
        var VCgroup = new L.LayerGroup();

        //Add Volcano Layer to Map
        const vcresponse = fetch(volcanoURL).then(vcresponse => vcresponse.json()).then(vcresponse => {
            L.geoJson(vcresponse, {
                pointToLayer: function (feature, latlng)
                {
                    var color = "#EBD834";
                    var borderColor = "#E30909";

                    var options = {
                        radius: 10,
                        fillColor: color,
                        fillOpacity: 0.5,
                        color: borderColor,
                        stroke: true,

                    };

                    return L.circleMarker(latlng, options);
                },
                onEachFeature: onEachFeatureVC
            
        }).addTo(VCgroup);
        })

        overlayTree.children.push({label: "Volcanoes", layer: VCgroup});
        VCgroup.addTo(map);

        //Add Hurricanes to Map
        var HCgroup = new L.LayerGroup();

        //Add Hurricane Layer to Map
        const hcresponse = fetch(hurricaneURL).then(hcresponse => hcresponse.json()).then(hcresponse => {
            L.geoJson(hcresponse, {
                style: function(feature)
                {
                    if(feature.geometry.type === "Polygon")
                    {
                        return {fillColor: "#FFE3FB", color: "#FF00E2", fillOpacity: 0.5, dashArray: '10, 5'} 
                    }
                    //Add color options for Lines
                    
                },


                pointToLayer: function (feature, latlng)
                {
                    var color = "#FFABF5";
                    var borderColor = "#FF00E2";

                    var options = {
                        radius: 10,
                        fillColor: color,
                        fillOpacity: 0.5,
                        color: borderColor,
                        stroke: true,

                    };

                    return L.circleMarker(latlng, options);
                },
                onEachFeature: onEachFeatureHC
            
        }).addTo(HCgroup);
        })

        overlayTree.children.push({label: "Hurricanes", layer: HCgroup});
        HCgroup.addTo(map);


        // hurricaneFiles = ['HurricaneTest.kml','Cone.kml','PastTrack.kml','Track.kml']
        // var Hurricanegroup = new L.LayerGroup();

        // for(item of hurricaneFiles)
        // {
        //     omnivore.kml('data/hurricanes/' + item)
        //     .on('ready', function() {
        //     // when this is fired, the layer
        //     // is done being initialized
        //         console.log("Hurricane Loaded");
        //     })
        //     .on('error', function() {
        //         // fired if the layer can't be loaded over AJAX
        //         // or can't be parsed
        //         console.log("Hurricane Failed");
        //     }).addTo(Hurricanegroup);
        // }

        // overlayTree.children.push({label: "Hurricanes", layer: Hurricanegroup});
        // //Hurricanegroup.addTo(map);

        // //L.geoJson('data/hurricanes/test.geojson').addTo(map);

        // //Add Hurricane Alerts Layer to Map
        // const Gjresponse = fetch(hurricaneURL, {headers: {"accept": "application/geo+json"}}).then(Gjresponse => Gjresponse.json()).then(Gjresponse => {
        //     L.geoJson(Gjresponse//, {
        //     //     style: function(feature) {
        //     //         return getPolygonColors(feature.properties.event);
        //     //     },
        //     //     onEachFeature: onEachFeatureNWS,
        //     //     //Filter out alerts that use Zones rather than Polygons for areas
        //     //     filter: function(feature, layer) {
        //     //         if(feature.geometry == null)
        //     //         {
        //     //             return false;
        //     //         }
        //     //         else
        //     //         {
        //     //             return true;
        //     //         }
        //     //     }
        //     // }
            
        // ).addTo(map);
        // })


        //Add Layer to Map
        L.control.layers.tree(baseTree,overlayTree,{selectorBack: true}).addTo(map);

        //Resize the Map to fit the current window size
        function resizeMapWithWindowChange()
        {
            document.getElementById("map").style.height = (window.innerHeight - 20) + "px";
            map.invalidateSize();
        }
        
        window.addEventListener("resize", resizeMapWithWindowChange);

    </script>
  </body>
</html>
